syntax = "proto3";

package interview.control;

service InterviewControl {
  rpc CreateInterviewSession(CreateInterviewSessionRequest)
      returns (CreateInterviewSessionResponse);
  rpc GetInterviewStatus(GetInterviewStatusRequest)
      returns (GetInterviewStatusResponse);
  rpc SubmitAnswerForScoring(SubmitAnswerForScoringRequest)
      returns (SubmitAnswerForScoringResponse);
}

message CreateInterviewSessionRequest {
  string application_id = 1;
  string candidate_id = 2;
  string user_id = 3;
  string job_id = 4;
  string resume_text = 5;
  string resume_url = 6;
  string job_title = 7;
  string job_description = 8;
  string internal_secret = 9;
}

message CreateInterviewSessionResponse {
  bool ok = 1;
  string error_message = 2;
  string interview_id = 3;
  string interview_token = 4;
  string status = 5;
  int64 expires_at_ms = 6;
}

message GetInterviewStatusRequest {
  oneof lookup {
    string interview_id = 1;
    string interview_token = 2;
  }
  string internal_secret = 3;
}

message GetInterviewStatusResponse {
  bool ok = 1;
  string error_message = 2;
  string interview_id = 3;
  string interview_token = 4;
  string status = 5;
  int32 current_question_index = 6;
  int32 total_questions = 7;
  string job_title = 8;
  int64 expires_at_ms = 9;
  bool interview_completed = 10;
}

message SubmitAnswerForScoringRequest {
  string interview_id = 1;
  int32 question_index = 2;
  string answer = 3;
  string internal_secret = 4;
}

message SubmitAnswerForScoringResponse {
  bool ok = 1;
  string error_message = 2;
  int32 score = 3;
  string evaluation = 4;
  bool needs_follow_up = 5;
  string follow_up_question = 6;
  string outcome = 7;
  bool interview_completed = 8;
  int32 current_question_index = 9;
  int32 total_questions = 10;
  string next_question_text = 11;
  string next_question_category = 12;
  string next_question_type = 13;
}
