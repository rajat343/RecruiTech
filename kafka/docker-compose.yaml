# RecruiTech Kafka Infrastructure
# Shared by: Airflow (agents), Backend (producer/consumer), kafka-trigger
#
# Start:  docker compose up -d
# UI:     http://localhost:8081
# Broker: localhost:9092 (external), kafka:9094 (internal/docker)
---
services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: recruitech-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - recruitech-kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: recruitech-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: recruitech
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    networks:
      - recruitech-kafka
    depends_on:
      kafka:
        condition: service_healthy

  kafka-trigger:
    build:
      context: .
      dockerfile: Dockerfile.trigger
    container_name: recruitech-kafka-trigger
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      KAFKA_INPUT_TOPIC: candidate-evaluation-request
      KAFKA_COMM_TOPIC: comm-notification
      KAFKA_FEEDBACK_TOPIC: rejection-feedback
      KAFKA_GROUP_ID: airflow-dag-trigger
      AIRFLOW_BASE_URL: http://host.docker.internal:8080
      AIRFLOW_USER: airflow
      AIRFLOW_PASS: airflow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - recruitech-kafka
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:

networks:
  recruitech-kafka:
    name: recruitech-kafka
    driver: bridge
